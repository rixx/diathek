{% load humanize %}
<form id="image-form-{{ image.pk }}"
      class="metadata-form{% if conflict %} conflict{% endif %}"
      data-image-id="{{ image.pk }}"
      data-version="{{ image.version }}"
      hx-patch="{% url 'image_save' image.pk %}"
      hx-headers='{"If-Match": "{{ image.version }}"}'
      hx-target="this"
      hx-swap="outerHTML">
    {% csrf_token %}
    {% if error %}
    <p class="metadata-error" role="alert">{{ error }}</p>
    {% endif %}
    {% if conflict %}
    <p class="metadata-conflict" role="alert">
        Version hat sich geändert – aktuelle Werte wurden neu geladen.
    </p>
    {% endif %}

    {% include "core/_place_input.html" %}

    <label class="field checkbox">
        <input type="checkbox"
               name="place_todo"
               value="true"
               hx-patch="{% url 'image_save' image.pk %}"
               hx-headers='{"If-Match": "{{ image.version }}"}'
               hx-target="#image-form-{{ image.pk }}"
               hx-swap="outerHTML"
               hx-vals='js:{"place_todo": this.checked ? "true" : "false"}'
               hx-trigger="change"
               {% if image.place_todo %}checked{% endif %}>
        Ort unklar
    </label>

    {% include "core/_date_input.html" %}

    <label class="field checkbox">
        <input type="checkbox"
               name="date_todo"
               value="true"
               hx-patch="{% url 'image_save' image.pk %}"
               hx-headers='{"If-Match": "{{ image.version }}"}'
               hx-target="#image-form-{{ image.pk }}"
               hx-swap="outerHTML"
               hx-vals='js:{"date_todo": this.checked ? "true" : "false"}'
               hx-trigger="change"
               {% if image.date_todo %}checked{% endif %}>
        Datum unklar
    </label>

    <label class="field checkbox">
        <input type="checkbox"
               name="needs_flip"
               value="true"
               hx-patch="{% url 'image_save' image.pk %}"
               hx-headers='{"If-Match": "{{ image.version }}"}'
               hx-target="#image-form-{{ image.pk }}"
               hx-swap="outerHTML"
               hx-vals='js:{"needs_flip": this.checked ? "true" : "false"}'
               hx-trigger="change"
               {% if image.needs_flip %}checked{% endif %}>
        Spiegeln
    </label>

    <label class="field">
        <span>Lightroom-Notiz</span>
        <input type="text"
               name="edit_todo"
               value="{{ image.edit_todo }}"
               hx-patch="{% url 'image_save' image.pk %}"
               hx-headers='{"If-Match": "{{ image.version }}"}'
               hx-target="#image-form-{{ image.pk }}"
               hx-swap="outerHTML"
               hx-trigger="change"
               hx-preserve="true"
               placeholder="z. B. Rot reduzieren">
    </label>

    <label class="field">
        <span>Beschreibung</span>
        <textarea name="description"
                  rows="6"
                  hx-patch="{% url 'image_save' image.pk %}"
                  hx-headers='{"If-Match": "{{ image.version }}"}'
                  hx-target="#image-form-{{ image.pk }}"
                  hx-swap="outerHTML"
                  hx-trigger="focusout changed"
                  hx-preserve="true">{{ image.description }}</textarea>
    </label>
</form>
